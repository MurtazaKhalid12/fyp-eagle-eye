; EagleEye LOCAL — self-contained ESP32-CAM human detector.
; Engine (TFLM + ESP-NN) is vendored in lib/final_inferencing/ and auto-added
; to the include path by PlatformIO — nothing is installed system-wide.
; Pinned to espressif32 6.5.0 (arduino-esp32 2.0.14) to match the known-good
; toolchain. ESP-NN is enabled inside the engine.

[env:esp32cam]
platform = espressif32@6.5.0
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0

; final_inferencing lives in lib/ and is the only library we use.
lib_ldf_mode = deep+
lib_compat_mode = strict
