; EagleEye Cloud — PlatformIO port of firmware/eagleeye-cloud (self-contained).
; All libraries are vendored in lib/ (incl. the eagleeye_inferencing engine with
; ESP-NN), so nothing is installed into Arduino's global libraries/ folder.
; The original Arduino sketch in firmware/eagleeye-cloud/ is left untouched.
;
; Pinned to espressif32 6.5.0 (arduino-esp32 2.0.14) to match the Arduino IDE
; toolchain. Board: AI Thinker ESP32-CAM, PSRAM, Huge-APP partition.

[env:esp32cam]
platform = espressif32@6.5.0
board = esp32cam
framework = arduino

monitor_speed = 115200
upload_speed = 921600

board_build.partitions = huge_app.csv
board_build.f_cpu = 240000000L

build_flags =
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    ; WebSockets includes <WiFi.h> behind a macro that PlatformIO's LDF can't
    ; evaluate, so expose the bundled WiFi headers globally (WiFi itself is
    ; already compiled+linked because the sketch includes it directly).
    -I"${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src"
    -I"${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFiClientSecure/src"

; Vendored libs live in lib/: eagleeye_inferencing (ESP-NN), ArduinoJson,
; ESP32Servo, PubSubClient, WebSockets. WiFiManager is only needed if you set
; ENABLE_PROVISIONING=1 in src/config.h — then add `lib_deps = tzapu/WiFiManager`.
lib_ldf_mode = deep+
